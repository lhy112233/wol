name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v1.1"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish static tarball
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install static build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            cmake \
            file \
            g++ \
            libc6-dev \
            libgtest-dev \
            ninja-build \
            tar \
            gzip \
            curl

      - name: Configure release-static preset
        run: cmake --preset release-static

      - name: Build release-static preset
        run: cmake --build --preset release-static

      - name: Run release-static tests
        run: ctest --preset release-static

      - name: Configure package preset
        run: cmake --preset package

      - name: Build package
        run: cmake --build --preset package

      - name: Verify archive contents
        run: |
          ./build/package/wol --version
          ldd build/package/wol 2>&1 | grep -E "not a dynamic executable|not a dynamic"
          readelf -d build/package/wol 2>&1 | grep "There is no dynamic section"
          file build/package/wol | grep -i "statically linked"
          test "$(tar -tzf dist/wol-linux-x86_64.tar.gz | sort | tr '\n' ' ')" = "wol wol.toml "

      - name: Generate SHA256 checksum
        run: |
          cd dist
          sha256sum wol-linux-x86_64.tar.gz > wol-linux-x86_64.tar.gz.sha256
          sha256sum -c wol-linux-x86_64.tar.gz.sha256

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SPDX SBOM
        run: syft scan dir:build/package/package -o spdx-json=dist/wol-linux-x86_64.spdx.json

      - name: Attest release tarball provenance
        uses: actions/attest@v4
        with:
          subject-path: dist/wol-linux-x86_64.tar.gz

      - name: Write release notes
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          checksum="$(cut -d ' ' -f 1 dist/wol-linux-x86_64.tar.gz.sha256)"
          cat > dist/release-notes.md <<EOF
          # wol ${TAG_NAME}

          Fully static Linux x86_64 WOL CLI release.

          Runtime archive contents:
          - wol
          - wol.toml

          Release assets:
          - wol-linux-x86_64.tar.gz
          - wol-linux-x86_64.tar.gz.sha256
          - wol-linux-x86_64.spdx.json

          SHA256:

          \`\`\`text
          ${checksum}  wol-linux-x86_64.tar.gz
          \`\`\`

          Verify the checksum:

          \`\`\`bash
          sha256sum -c wol-linux-x86_64.tar.gz.sha256
          \`\`\`

          Verify GitHub artifact provenance:

          \`\`\`bash
          gh attestation verify wol-linux-x86_64.tar.gz --repo lhy112233/wol
          \`\`\`
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" \
              dist/wol-linux-x86_64.tar.gz \
              dist/wol-linux-x86_64.tar.gz.sha256 \
              dist/wol-linux-x86_64.spdx.json \
              --clobber
            gh release edit "${TAG_NAME}" --notes-file dist/release-notes.md
          else
            gh release create "${TAG_NAME}" \
              dist/wol-linux-x86_64.tar.gz \
              dist/wol-linux-x86_64.tar.gz.sha256 \
              dist/wol-linux-x86_64.spdx.json \
              --title "wol ${TAG_NAME}" \
              --notes-file dist/release-notes.md
          fi
